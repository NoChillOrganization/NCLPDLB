name: Automatic Dependency Submission

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Submit dependency snapshot to GitHub Dependency API
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_REF: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import json, datetime, os, re, urllib.request, urllib.error, sys

          # Parse requirements.txt directly — no package installation needed.
          # This avoids downloading torch (200 MB+) and other heavy packages
          # solely to call `pip list`.
          resolved = {}
          with open("requirements.txt") as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith("#"):
                      continue
                  # Strip inline comments
                  line = line.split("#")[0].strip()
                  if not line:
                      continue
                  # Parse: name[extras] op version ; markers
                  m = re.match(r'^([A-Za-z0-9][A-Za-z0-9._-]*)(\[.*?\])?\s*([><=!~^,\s\S]*)?$', line)
                  if not m:
                      continue
                  name = m.group(1).lower().replace("_", "-")
                  version_spec = (m.group(3) or "").strip()
                  # Extract the first version number from >=X, ==X, ~=X, pinned ==X
                  ver_m = re.search(r'[><=~!]{1,2}\s*(\d[\d.]*)', version_spec)
                  version = ver_m.group(1) if ver_m else "0"
                  purl = f"pkg:pypi/{name}@{version}"
                  resolved[name] = {
                      "package_url": purl,
                      "relationship": "direct",
                      "scope": "runtime",
                      "dependencies": [],
                  }

          if not resolved:
              print("No packages parsed from requirements.txt — nothing to submit.", file=sys.stderr)
              sys.exit(1)

          snapshot = {
              "version": 0,
              "sha": os.environ["COMMIT_SHA"],
              "ref": os.environ["COMMIT_REF"],
              "job": {
                  "id": os.environ["RUN_ID"],
                  "correlator": "dependency-submission/pip",
              },
              "detector": {
                  "name": "pip-direct-snapshot",
                  "version": "1.0.0",
                  "url": (
                      f"{os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/"
                      f"{os.environ['REPO']}/.github/workflows/dependency-submission.yml"
                  ),
              },
              "scanned": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "manifests": {
                  "requirements.txt": {
                      "name": "requirements.txt",
                      "file": {"source_location": "requirements.txt"},
                      "resolved": resolved,
                  }
              },
          }

          token = os.environ["GH_TOKEN"]
          repo  = os.environ["REPO"]
          url   = f"https://api.github.com/repos/{repo}/dependency-graph/snapshots"
          data  = json.dumps(snapshot).encode()

          req = urllib.request.Request(
              url, data=data,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  body = json.loads(resp.read())
                  print(f"Snapshot submitted (HTTP {resp.status}): id={body.get('id')}, "
                        f"{len(resolved)} packages")
          except urllib.error.HTTPError as exc:
              print(f"HTTP {exc.code}: {exc.read().decode()}", file=sys.stderr)
              sys.exit(1)
          PYEOF
