name: Automatic Dependency Submission

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install direct dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt --no-deps || pip install -r requirements.txt

      - name: Submit Python dependency snapshot to GitHub Dependency API
        uses: advanced-security/pip-dependency-submission-action@v1
        with:
          token: ${{ github.token }}
          pipRequirementsFile: requirements.txt
