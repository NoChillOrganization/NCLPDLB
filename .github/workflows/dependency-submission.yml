name: Automatic Dependency Submission

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Submit dependency snapshot to GitHub Dependency API
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_REF: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import subprocess, json, datetime, os, urllib.request, urllib.error, sys

          packages = json.loads(
              subprocess.run(["pip", "list", "--format=json"],
                             capture_output=True, text=True, check=True).stdout
          )

          resolved = {}
          for pkg in packages:
              name_lower = pkg["name"].lower().replace("_", "-")
              purl = f"pkg:pypi/{name_lower}@{pkg['version']}"
              resolved[name_lower] = {
                  "package_url": purl,
                  "relationship": "direct",
                  "scope": "runtime",
                  "dependencies": [],
              }

          snapshot = {
              "version": 0,
              "sha": os.environ["COMMIT_SHA"],
              "ref": os.environ["COMMIT_REF"],
              "job": {
                  "id": os.environ["RUN_ID"],
                  "correlator": "dependency-submission/pip",
              },
              "detector": {
                  "name": "pip-direct-snapshot",
                  "version": "1.0.0",
                  "url": "https://github.com/NoChillModeOnline/NCLPDLB/.github/workflows/dependency-submission.yml",
              },
              "scanned": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "manifests": {
                  "requirements.txt": {
                      "name": "requirements.txt",
                      "file": {"source_location": "requirements.txt"},
                      "resolved": resolved,
                  }
              },
          }

          token = os.environ["GH_TOKEN"]
          repo  = os.environ["REPO"]
          url   = f"https://api.github.com/repos/{repo}/dependency-graph/snapshots"
          data  = json.dumps(snapshot).encode()

          req = urllib.request.Request(
              url, data=data,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  body = json.loads(resp.read())
                  print(f"Snapshot submitted (HTTP {resp.status}): id={body.get('id')}")
          except urllib.error.HTTPError as exc:
              print(f"HTTP {exc.code}: {exc.read().decode()}", file=sys.stderr)
              sys.exit(1)
          PYEOF
