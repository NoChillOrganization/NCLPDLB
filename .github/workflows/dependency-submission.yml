name: Automatic Dependency Submission

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Submit Python dependency snapshot
        uses: advanced-security/python-dependency-submission-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export dependency list artifact
        run: |
          pip list --format=freeze > dependency-snapshot.txt
          echo "Dependency snapshot generated."

      - name: Upload dependency snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-snapshot
          path: dependency-snapshot.txt
          if-no-files-found: warn
          retention-days: 30
