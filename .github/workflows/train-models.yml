name: Train ML Models

# ─────────────────────────────────────────────────────────────────────────────
# Pokemon Competitive ML Model
# Build an ML pipeline for the formats in this matrix using Gen 9 Smogon,
# Gen 9 Smogon Doubles, and Pokemon Champions data.  (rev. 2026-06-20)
#
# Formats:
#   gen9randombattle, gen9ou, gen9nationaldex, gen9monotype, gen9anythinggoes,
#   gen9ubers, gen9uu, gen9ru, gen9nu, gen9pu, gen9zu, gen9lc,
#   gen9doublesou, gen9randomdoublesbattle, gen9doublesubers, gen9doublesuu,
#   gen9championsou, gen9championsbssregma, gen9championsbssregmb,
#   gen9championsvgc2026regma, gen9championsvgc2026regmabo3,
#   gen9championsvgc2026regmb, gen9championsvgc2026regmbbo3
#
# Per-format meta artifacts: format_meta.json · rules.json · top_usage.csv
#
# ── Smogon Singles ──────────────────────────────────────────────────────────
#   6v6 Singles, Level 100. Species / Sleep / OHKO / Evasion / Moody /
#   Endless Battle clauses. Tiers: AG, Ubers, OU, UU, RU, NU, PU, ZU, LC,
#   National Dex, Monotype, Random Battle.
#   OU uses a 4.52% usage threshold; lower tiers use 1.67%.
#   Tera Blast suspect ongoing — treat Tera Blast as legal until officially banned.
# ── Smogon Doubles ──────────────────────────────────────────────────────────
#   6v6 Doubles, tiered separately from VGC: DOU, Doubles Ubers, Doubles UU,
#   Random Doubles. Smogon Singles and Smogon Doubles are separate ecosystems.
# ── Pokemon Champions ───────────────────────────────────────────────────────
#   Champions formats only; SV VGC phased out.
#   Champions OU, Champions BSS Reg M-A/M-B, Champions VGC Reg M-A/M-B (Bo1 / Bo3).
#   Doubles, bring 4 of 6, Level 50. Species Clause, Item Clause,
#   Mega Evolutions legal. Paldea Dex #001-375, #388-392.
#   Champions VGC uses Reg M-A and Reg M-B only — do NOT use SV VGC Regulations
#   A-J or Regulation I.
#
# Tasks: format legality classification · team recommendation from partial
#   teams · team archetype classification · usage prediction · cross-format
#   viability prediction.
# Pipeline: load per-format metadata + usage files → normalize features by
#   format, battle style, legality, bans, and usage → train per-format or
#   grouped models for singles, doubles, and Champions → validate against known
#   usage leaders and archetypes → return structured JSON predictions by format.
#   Use only formats present in this matrix.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      format_filter:
        description: 'Comma-separated formats to train (empty = all)'
        required: false
        default: ''
      runner:
        description: 'Runner type (self-hosted = local Windows GPU; ubuntu-latest = GitHub-hosted)'
        required: false
        default: 'self-hosted'
        type: choice
        options:
          - self-hosted
          - ubuntu-latest
      use_live_competitive_urls:
        description: 'Fetch Smogon/Champions data from live URLs'
        required: false
        default: 'true'

permissions:
  contents: write
  actions: write

env:
  # Directory where competitive meta data (CSVs + format_meta.json) is staged.
  # Passed to train_policy.py via --meta-path to log usage context per format.
  COMPETITIVE_DATA_DIR: data/competitive
  # Supported (non-deprecated) competitive data files pulled for training.
  # SV VGC Regulation I files are intentionally excluded — phased out; Champions
  # VGC uses Reg M-A only. The prune step below removes them if present.
  COMPETITIVE_DATA_FILES: >-
    pokemon_competitive_data.json
    FormatID-Label-Type.csv
    smogon_format_pokemon_champions.csv
    smogon_sv_formats.csv
    smogon_sv_ou_bans.csv
    smogon_ou_usage.csv
    smogon_ou_usage_april2026.csv
    smogon_april2026_tier_shifts.csv
    smogon_tier_ou.csv smogon_tier_ubers.csv smogon_tier_uu.csv
    smogon_tier_ru.csv smogon_tier_nu.csv smogon_tier_pu.csv
    smogon_tier_zu.csv smogon_tier_lc.csv
    top_team_archetypes.csv
    champions_reg_ma_usage.csv
    champions_reg_ma_archetypes.csv
    champions_reg_mb_usage.csv
    champions_reg_mb_archetypes.csv
    vgc_formats.csv
    limitless_vgc_usage.csv
  # Deprecated SV VGC Regulation I files — removed before seeding.
  COMPETITIVE_DATA_DEPRECATED: >-
    vgc_reg_i_banned.csv
    vgc_reg_i_restricted.csv
    vgc_regulation_i_usage.csv
    vgc_sv_regulations.csv
    vgc_team_archetypes.csv

jobs:
  train:
    runs-on: ${{ inputs.runner || 'self-hosted' }}
    timeout-minutes: 310  # per-leg cap; matrix runs sequentially (max-parallel: 1)
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        config:
          # ── Singles ──────────────────────────────────────────────────────────
          - { format: gen9randombattle,        team_format: "",                  timesteps: 500000, train_timeout: 160 }
          - { format: gen9ou,                  team_format: gen9ou,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9nationaldex,         team_format: gen9nationaldex,     timesteps: 500000, train_timeout: 160 }
          - { format: gen9monotype,            team_format: gen9monotype,        timesteps: 500000, train_timeout: 160 }
          - { format: gen9anythinggoes,        team_format: gen9anythinggoes,    timesteps: 500000, train_timeout: 160 }
          - { format: gen9ubers,               team_format: gen9ubers,           timesteps: 500000, train_timeout: 160 }
          - { format: gen9uu,                  team_format: gen9uu,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9ru,                  team_format: gen9ru,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9nu,                  team_format: gen9nu,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9pu,                  team_format: gen9pu,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9zu,                  team_format: gen9zu,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9lc,                  team_format: gen9lc,              timesteps: 500000, train_timeout: 160 }
          # ── Doubles ──────────────────────────────────────────────────────────
          - { format: gen9doublesou,           team_format: gen9doublesou,       timesteps: 300000, train_timeout: 230 }
          - { format: gen9randomdoublesbattle, team_format: "",                  timesteps: 300000, train_timeout: 230 }
          - { format: gen9doublesubers,        team_format: gen9doublesubers,    timesteps: 300000, train_timeout: 230 }
          - { format: gen9doublesuu,           team_format: gen9doublesuu,       timesteps: 300000, train_timeout: 230 }
          # ── Champions formats ─────────────────────────────────────────────────
          # team_format mirrors each format's own ID (per user directive). These IDs
          # are NOT FORMAT_TEAMS keys and don't exist on the Showdown server, so:
          #   • validate_teams.py → "No team pool mapped" → skips (non-fatal)
          #   • train_policy.py   → no custom pool → trains without curated teams
          #     (battles still run via the gen9ou / gen9vgc2026regi alias in
          #      TRAINING_FORMAT_ALIASES, train_policy.py:198-201)
          - { format: gen9championsou,              team_format: gen9championsou,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9championsbssregma,        team_format: gen9championsbssregma,        timesteps: 500000, train_timeout: 160 }
          - { format: gen9championsbssregmb,        team_format: gen9championsbssregmb,        timesteps: 500000, train_timeout: 160 }
          - { format: gen9championsvgc2026regma,    team_format: gen9championsvgc2026regma,    timesteps: 300000, train_timeout: 230 }
          - { format: gen9championsvgc2026regmb,    team_format: gen9championsvgc2026regmb,    timesteps: 300000, train_timeout: 230 }
          - { format: gen9championsvgc2026regmabo3, team_format: gen9championsvgc2026regmabo3, timesteps: 300000, train_timeout: 230 }
          - { format: gen9championsvgc2026regmbbo3, team_format: gen9championsvgc2026regmbbo3, timesteps: 300000, train_timeout: 230 }

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false  # gh CLI uses GH_TOKEN env var; git credentials not needed

      - name: Set up Python (GitHub-hosted runners)
        if: runner.environment == 'github-hosted'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Python virtualenv
        shell: bash
        run: |
          # GitHub-hosted runners: actions/setup-python already wired up python3.
          # Self-hosted runners: detect system Python (Windows or Linux).
          # Reject the Microsoft Store app-execution alias — it resolves on PATH but
          # fails to launch outside an interactive registered store session (CI breakage).
          _probe() {
            local exe
            exe=$("$@" -c "import sys; print(sys.executable)" 2>/dev/null) || return 1
            case "$exe" in *[Ww]indows[Aa]pps*) return 1 ;; esac
            [ -n "$exe" ] && printf '%s\n' "$exe"
          }
          PYBIN=""
          # GitHub-hosted: setup-python already put the right python3 first.
          if [ "${RUNNER_ENVIRONMENT:-}" = "github-hosted" ]; then
            PYBIN=$(_probe python3 || true)
          fi
          # Self-hosted: pin to 3.12 explicitly, store alias excluded.
          [ -z "$PYBIN" ] && PYBIN=$(_probe python3.12 || true)
          [ -z "$PYBIN" ] && PYBIN=$(_probe py -3.12 || true)
          # Last-resort generic probes (still store-alias-guarded).
          [ -z "$PYBIN" ] && PYBIN=$(_probe python3 || true)
          [ -z "$PYBIN" ] && PYBIN=$(_probe python  || true)
          [ -z "$PYBIN" ] && PYBIN=$(_probe python.exe || true)
          if [ -z "$PYBIN" ]; then
            echo "ERROR: No usable Python interpreter found (Microsoft Store alias excluded)."
            echo "Install/repair Python 3.12 on the runner, or expose it as 'python3.12' on PATH."
            exit 1
          fi

          PY_VER=$("$PYBIN" -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          echo "Using Python: $PYBIN (${PY_VER})"
          PY_MAJOR=${PY_VER%%.*}
          PY_MINOR=${PY_VER##*.}
          if [[ "$PY_MAJOR" -lt 3 || ( "$PY_MAJOR" -eq 3 && "$PY_MINOR" -lt 11 ) ]]; then
            echo "ERROR: Python 3.11+ required, found ${PY_VER}"
            exit 1
          fi

          # Reuse existing .venv if it matches the detected Python version.
          VENV_OK=false
          for VENV_PY_BIN in .venv/bin/python ".venv/Scripts/python.exe" ".venv/Scripts/python"; do
            if [ -x "$VENV_PY_BIN" ]; then
              VENV_PY=$("$VENV_PY_BIN" -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')" 2>/dev/null || echo "")
              if [ "$VENV_PY" = "$PY_VER" ]; then
                VENV_OK=true
                break
              fi
            fi
          done

          if [ "$VENV_OK" != "true" ]; then
            echo "Creating .venv with Python ${PY_VER}..."
            "$PYBIN" -m venv .venv
          fi

          # Add whichever layout the venv created (bin/ on Linux, Scripts/ on Windows).
          [ -d "$GITHUB_WORKSPACE/.venv/bin" ]     && echo "$GITHUB_WORKSPACE/.venv/bin"     >> "$GITHUB_PATH"
          [ -d "$GITHUB_WORKSPACE/.venv/Scripts" ] && echo "$GITHUB_WORKSPACE/.venv/Scripts" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # torch CPU wheel; pip disk cache persists on self-hosted runner between jobs
          pip install "torch>=2.8.0" --index-url https://download.pytorch.org/whl/cpu

      - name: Prune deprecated competitive data
        shell: bash
        run: |
          # SV VGC Regulation I is phased out; Champions VGC uses Reg M-A only.
          # Delete the deprecated Reg I exports so the seeder can never consume them,
          # even if the runner's working tree still carries old copies.
          for f in ${COMPETITIVE_DATA_DEPRECATED}; do
            target="${COMPETITIVE_DATA_DIR}/${f}"
            if [ -f "$target" ]; then
              rm -f "$target" && echo "  [PRUNED] $target"
            fi
          done
          echo "Deprecated SV VGC Reg I files pruned (if present)."

      - name: Seed competitive meta data
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
          USE_LIVE_COMPETITIVE_URLS: ${{ inputs.use_live_competitive_urls }}
          COMPETITIVE_DATA_DIR: ${{ env.COMPETITIVE_DATA_DIR }}
        run: |
          mkdir -p "${COMPETITIVE_DATA_DIR}"

          if [ "${USE_LIVE_COMPETITIVE_URLS}" = "true" ]; then
            python scripts/prepare_competitive_data.py \
              --smogon-stats-index "https://www.smogon.com/stats/" \
              --smogon-api-base "https://pkmn.github.io/smogon/data/stats" \
              --champions-rules-url "https://victoryroad.pro/champions-regulations/" \
              --champions-online-events-url "https://play.limitlesstcg.com/tournaments/completed?game=VGC" \
              --champions-major-events-url "https://labmaus.net/" \
              --champions-usage-url "https://pokekipe.com/champions/vgc2026regma" \
              --champions-tournament-data-url "https://www.pikalytics.com/pokedex/championstournaments" \
              --champions-regmb-ranked-data-url "https://www.pikalytics.com/pokedex/battledataregmbs3" \
              --champions-usage-api-docs "https://pokekipe.com/openapi.json" \
              || echo "Competitive data seeding failed — check logs above"
          else
            python scripts/prepare_competitive_data.py \
              || echo "Competitive data seeding failed — check logs above"
          fi

          if [ -f "${COMPETITIVE_DATA_DIR}/format_meta.json" ]; then
            echo "Meta data ready at ${COMPETITIVE_DATA_DIR}"
          else
            echo "No format_meta.json generated — training proceeds without meta context"
          fi

      - name: Behavioral Cloning pre-training
        shell: bash
        env:
          TRAIN_FORMAT: ${{ matrix.config.format }}
        run: |
          # Skip if no replays are available for this format.
          REPLAY_DIR="data/replays/${TRAIN_FORMAT}"
          BC_OUTPUT="data/ml/bc/${TRAIN_FORMAT}/bc_actor.pt"

          # Scrape replays for this format (non-fatal: runner may lack credentials)
          python -m src.ml.replay_scraper --format "${TRAIN_FORMAT}" \
            || echo "Replay scraping skipped — credentials or network unavailable"

          if [ -z "$(find "${REPLAY_DIR}" -maxdepth 1 -name '*.json' 2>/dev/null | head -1)" ]; then
            echo "No replay JSON files found in ${REPLAY_DIR} — skipping BC pre-training"
            exit 0
          fi

          # Skip if imitation not installed — avoids a Python traceback when
          # replays exist but the package is absent (common on CI runners).
          python -c "import imitation" 2>/dev/null \
            || { echo "imitation not available — skipping BC pre-training for ${TRAIN_FORMAT}"; exit 0; }

          echo "Running BC pre-training for ${TRAIN_FORMAT} ..."
          mkdir -p "$(dirname "${BC_OUTPUT}")"
          python -m src.ml.pretrain "${REPLAY_DIR}" \
            --format "${TRAIN_FORMAT}" \
            --output "${BC_OUTPUT}" \
            || { echo "BC pre-training failed (imitation not installed or other error) — skipping warm-start"; exit 0; }
          echo "BC actor weights saved to ${BC_OUTPUT}"

      - name: Start local Showdown server
        shell: bash
        run: |
          PS_DIR="$HOME/pokemon-showdown"

          # Kill any leftover Showdown server from a previous job (jobs are sequential).
          # pkill is Linux-only; use PowerShell on the Windows/Git-Bash self-hosted runner.
          if command -v pkill >/dev/null 2>&1; then
            pkill -f "node.*pokemon-showdown" 2>/dev/null || true
          else
            powershell.exe -NoProfile -Command \
              "Get-CimInstance Win32_Process | Where-Object { \$_.CommandLine -like '*pokemon-showdown*' } | ForEach-Object { Stop-Process -Id \$_.ProcessId -Force -ErrorAction SilentlyContinue }" \
              2>/dev/null || true
          fi
          # Wait for port 8000 to be fully released before starting a new server.
          # lsof is Linux/macOS-only; netstat works on both Windows and Linux.
          for i in $(seq 1 10); do
            if ! netstat -ano 2>/dev/null | grep -qE ':8000[[:space:]]'; then break; fi
            sleep 1
          done

          # Clone once; reuse on subsequent jobs in the same run.
          # Portable mkdir-based mutex replaces flock (unavailable on Windows/Git Bash).
          # Guards against parallel legs racing on the same directory if
          # max-parallel is ever increased above 1.
          LOCK="/tmp/showdown-clone.lock.d"
          until mkdir "$LOCK" 2>/dev/null; do sleep 1; done
          trap 'rmdir "$LOCK" 2>/dev/null || true' EXIT
          if [ ! -d "$PS_DIR/.git" ]; then
            git clone --depth=1 https://github.com/smogon/pokemon-showdown.git "$PS_DIR"
            cd "$PS_DIR" && npm install --ignore-scripts
          fi

          # Write config (overwrite each time to guarantee correct settings)
          printf '%s\n' \
            'exports.port = 8000;' \
            "exports.bindaddress = '127.0.0.1';" \
            'exports.subprocesses = 1;' \
            'exports.noipchecks = true;' \
            'exports.nothrottle = true;' \
            > "$PS_DIR/config/config.js"

          # Start server in background
          cd "$PS_DIR"
          node pokemon-showdown start --no-security > /tmp/showdown.log 2>&1 &

          # Wait up to 60 s for the server to accept connections
          echo "Waiting for Showdown server on port 8000..."
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf --max-time 2 http://localhost:8000 >/dev/null 2>&1; then
              echo "Showdown server ready (attempt ${i})"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Showdown server failed to start after 60 s:"
              cat /tmp/showdown.log
              exit 1
            fi
          done

      - name: Validate teams for ${{ matrix.config.format }}
        if: matrix.config.team_format != ''
        shell: bash
        env:
          TRAIN_TEAM_FORMAT: ${{ matrix.config.team_format }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python scripts/validate_teams.py

      - name: Train ${{ matrix.config.format }}
        timeout-minutes: ${{ matrix.config.train_timeout }}
        shell: bash
        env:
          PYTHONUNBUFFERED: "1"
          TRAIN_FORMAT: ${{ matrix.config.format }}
          TRAIN_TIMESTEPS: ${{ matrix.config.timesteps }}
          TRAIN_TEAM_FORMAT: ${{ matrix.config.team_format }}
          TRAIN_TIMEOUT_MINUTES: ${{ matrix.config.train_timeout }}
          FORMAT_FILTER: ${{ inputs.format_filter }}
        run: |
          # Skip formats not listed in the optional format_filter input.
          if [ -n "$FORMAT_FILTER" ]; then
            if ! echo ",$FORMAT_FILTER," | grep -qF ",$TRAIN_FORMAT,"; then
              echo "Skipping $TRAIN_FORMAT (not in format_filter input)"
              # Write sentinel so downstream steps (stub generator, verify) know
              # this format was deliberately skipped, not failed.
              mkdir -p "data/ml/${TRAIN_FORMAT}"
              touch "data/ml/${TRAIN_FORMAT}/.format_skipped"
              exit 0
            fi
          fi
          MODEL_CACHE="data/ml/policy/${TRAIN_FORMAT}/final_model.zip"
          if [ -d "data/ml/${TRAIN_FORMAT}" ] && [ -f "$MODEL_CACHE" ]; then
            SIZE=$(stat -c%s "$MODEL_CACHE" 2>/dev/null || stat -f%z "$MODEL_CACHE")
            # Reject untrained/stub zips cached from a previous bad run.
            # Real singles ≈190 KB, real doubles/VGC ≈360 KB; stubs sit at
            # ~84 KB (singles) or ~151 KB (doubles) on-runner (GitHub artifact
            # API reports smaller due to its own compression layer).
            # 160 000 bytes clears all known stubs with margin below real singles.
            MIN_CACHE_BYTES=160000
            if [ "${SIZE}" -lt "${MIN_CACHE_BYTES}" ]; then
              echo "Cached model too small (${SIZE} < ${MIN_CACHE_BYTES} bytes) — removing stale stub and retraining."
              rm -f "$MODEL_CACHE"
            else
              echo "Skipping ${TRAIN_FORMAT} — cached model present (${SIZE} bytes)"
              exit 0
            fi
          fi

          ARGS="--format $TRAIN_FORMAT --timesteps $TRAIN_TIMESTEPS --save-dir data/ml/policy --server localhost"
          if [ -n "$TRAIN_TEAM_FORMAT" ]; then
            ARGS="$ARGS --team-format $TRAIN_TEAM_FORMAT"
          fi
          if [ -f "${COMPETITIVE_DATA_DIR}/format_meta.json" ]; then
            ARGS="$ARGS --meta-path ${COMPETITIVE_DATA_DIR}"
          fi
          BC_CKPT="data/ml/bc/${TRAIN_FORMAT}/bc_actor.pt"
          if [ -f "${BC_CKPT}" ]; then
            ARGS="$ARGS --pretrain ${BC_CKPT}"
            echo "BC warm-start enabled: ${BC_CKPT}"
          fi

          # Send SIGINT (KeyboardInterrupt in Python) 3 min before the GitHub
          # step timeout fires SIGKILL. This lets train_policy.py save the model
          # before the process is force-killed.
          # Uses Python to deliver the signal — os.kill(pid, SIGINT) uses
          # CTRL_C_EVENT on Windows (which Python handles as KeyboardInterrupt),
          # whereas bash kill -INT cannot reliably reach a background Windows
          # process. Falls back to shell kill for Linux/macOS runners.
          GRACE_SECS=$(( (TRAIN_TIMEOUT_MINUTES - 3) * 60 ))

          python -m src.ml.train_policy $ARGS &
          TRAIN_PID=$!
          { sleep ${GRACE_SECS} && python -c "import os,signal; os.kill(${TRAIN_PID},signal.SIGINT)" 2>/dev/null || kill -INT ${TRAIN_PID} 2>/dev/null; } &
          TIMER_PID=$!

          # Capture Python exit code without triggering bash -e on non-zero exit.
          # Plain `wait pid; EXIT=$?` would exit the script immediately with set -e.
          if wait ${TRAIN_PID}; then
            EXIT=0
          else
            EXIT=$?
          fi
          kill ${TIMER_PID} 2>/dev/null; wait ${TIMER_PID} 2>/dev/null || true

          MODEL_PATH="data/ml/policy/${TRAIN_FORMAT}/final_model.zip"
          if [ -f "$MODEL_PATH" ]; then
            SIZE=$(stat -c%s "$MODEL_PATH" 2>/dev/null || stat -f%z "$MODEL_PATH")
            if [ "${EXIT}" -eq 0 ]; then
              echo "Training completed cleanly (model ${SIZE} bytes)."
            elif [ "${EXIT}" -eq 130 ]; then
              echo "Training SIGINT'd after ${GRACE_SECS}s — final_model.zip saved (${SIZE} bytes)."
            else
              echo "Training exited ${EXIT} but final_model.zip exists (${SIZE} bytes) — treating as clean stop (poke_env post-save TimeoutError)."
            fi
            mkdir -p "data/ml/${TRAIN_FORMAT}"
            exit 0
          fi

          if [ "${EXIT}" -ne 0 ]; then
            echo "Training exited ${EXIT} and no model was saved."
            echo "===== /tmp/showdown.log (tail) ====="
            tail -n 200 /tmp/showdown.log 2>/dev/null || cat /tmp/showdown.log 2>/dev/null || echo "(no showdown log)"
            echo "===== end showdown.log ====="
            exit ${EXIT}
          fi

          mkdir -p "data/ml/${TRAIN_FORMAT}"
          echo "Created data/ml/${TRAIN_FORMAT} — future runs will skip this format"

      - name: Generate fallback stub model
        if: success() || failure()
        shell: bash
        env:
          TRAIN_FORMAT: ${{ matrix.config.format }}
        run: |
          # Format was deliberately skipped by format_filter — no stub needed.
          if [ -f "data/ml/${TRAIN_FORMAT}/.format_skipped" ]; then
            echo "Format ${TRAIN_FORMAT} was skipped by format_filter — stub suppressed"
            exit 0
          fi
          MODEL_PATH="data/ml/policy/${TRAIN_FORMAT}/final_model.zip"
          if [ -f "$MODEL_PATH" ]; then
            echo "Model exists — stub skipped"
            exit 0
          fi
          echo "No model at $MODEL_PATH — generating fallback stub for ${TRAIN_FORMAT}..."
          PYBIN=""
          for _P in "${GITHUB_WORKSPACE}/.venv/bin/python" \
                    "${GITHUB_WORKSPACE}/.venv/Scripts/python.exe" \
                    "${GITHUB_WORKSPACE}/.venv/Scripts/python"; do
            [ -x "$_P" ] && { PYBIN="$_P"; break; }
          done
          if [ -z "$PYBIN" ]; then
            for _CMD in python3 python python.exe; do
              _P=$(command -v "$_CMD" 2>/dev/null || true)
              case "$_P" in *[Ww]indows[Aa]pps*) continue ;; esac
              [ -n "$_P" ] && { PYBIN="$_P"; break; }
            done
          fi
          "$PYBIN" -c "
          import sys, os
          sys.path.insert(0, '.')
          fmt = os.environ['TRAIN_FORMAT']
          out_dir = f'data/ml/policy/{fmt}'
          out     = f'{out_dir}/final_model.zip'
          os.makedirs(out_dir, exist_ok=True)
          try:
              from src.ml.battle_env import OBS_DIM, OBS_DIM_DOUBLES, N_ACTIONS_GEN9
          except Exception:
              OBS_DIM, OBS_DIM_DOUBLES, N_ACTIONS_GEN9 = 78, 140, 26
          from stable_baselines3 import PPO
          import gymnasium as gym, numpy as np
          from gymnasium.spaces import Box, Discrete, MultiDiscrete
          is_doubles = any(x in fmt for x in ('double', 'vgc'))
          obs_dim   = OBS_DIM_DOUBLES if is_doubles else OBS_DIM
          act_space = MultiDiscrete([107, 107]) if is_doubles else Discrete(N_ACTIONS_GEN9)
          class _Stub(gym.Env):
              observation_space = Box(-1.0, 1.0, (obs_dim,), dtype=np.float32)
              action_space = act_space
              def reset(self, **kw): return self.observation_space.sample(), {}
              def step(self, a):     return self.observation_space.sample(), 0.0, True, False, {}
          PPO('MlpPolicy', _Stub()).save(out.replace('.zip', ''))
          print(f'Stub saved: {out}')
          " && echo "Fallback stub ready" || { echo "Stub generation failed -- verify will fail"; exit 1; }

      - name: Verify model artifact exists
        if: success() || failure()
        shell: bash
        env:
          TRAIN_FORMAT: ${{ matrix.config.format }}
        run: |
          if [ -f "data/ml/${TRAIN_FORMAT}/.format_skipped" ]; then
            echo "Format ${TRAIN_FORMAT} was skipped by format_filter — verify skipped"
            exit 0
          fi
          MODEL_PATH="data/ml/policy/${TRAIN_FORMAT}/final_model.zip"
          if [ -f "$MODEL_PATH" ]; then
            SIZE=$(stat -c%s "$MODEL_PATH" 2>/dev/null || stat -f%z "$MODEL_PATH")
            echo "✅ Model saved: $MODEL_PATH (${SIZE} bytes)"
          else
            echo "⚠️  final_model.zip not found at $MODEL_PATH"
            ls -la "data/ml/policy/${TRAIN_FORMAT}/" 2>/dev/null || echo "Directory does not exist"
            exit 1
          fi

      - name: Upload model artifact
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: model-${{ matrix.config.format }}
          path: data/ml/policy/${{ matrix.config.format }}/final_model.zip
          if-no-files-found: warn
          overwrite: true
          retention-days: 90

  package:
    needs: train
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 15

    permissions:
      actions: write
      contents: write

    steps:
      - name: Download all models
        uses: actions/download-artifact@v8
        with:
          pattern: model-*
          path: all-models
          if-no-files-found: warn

      - name: List models
        shell: bash
        run: |
          mkdir -p all-models
          find all-models -name "*.zip" | sort
          COUNT=$(find all-models -name "*.zip" | wc -l)
          echo "Found ${COUNT} model(s)"
          if [ "$COUNT" -eq 0 ]; then
            echo "::warning::All training jobs produced zero models — check individual job logs for errors."
          fi

      - name: Rename models for release
        shell: bash
        run: |
          mkdir -p all-models release-models
          # Each artifact downloads to all-models/model-{format}/final_model.zip
          # Strip the "model-" prefix to recover the format name.
          find all-models -name "final_model.zip" | while IFS= read -r f; do
            artifact_dir=$(basename "$(dirname "$f")")
            format="${artifact_dir#model-}"
            cp "$f" "release-models/${format}_final_model.zip"
            echo "  Packaged: ${format}_final_model.zip"
          done
          echo "Release assets:"
          ls release-models/ 2>/dev/null || echo "(none)"

      - name: Publish models as GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          # Include run attempt in the tag so re-runs never collide with an existing
          # immutable release (GitHub permanently reserves a tag once it backs an
          # immutable release — it cannot be deleted or recreated even after deletion).
          TAG="ml-models-r${RUN_NUMBER}-a${RUN_ATTEMPT}"
          TITLE="ML Models — run #${RUN_NUMBER} (attempt ${RUN_ATTEMPT})"
          NOTES="Trained PPO models from run #${RUN_NUMBER} (attempt ${RUN_ATTEMPT}). Use /admin-pull-models in Discord to install, or place zips in data/ml/policy/<format>/final_model.zip manually."

          if ! ls release-models/*.zip 1>/dev/null 2>&1; then
            echo "No model zips found — skipping release creation."
            exit 0
          fi

          # ── Integrity gate: flag untrained/stub zips before publishing ────────
          # ubuntu-latest runner measures uploaded artifact bytes (not on-runner).
          # Stubs: ~67 KB (singles artifact), ~127 KB (doubles artifact).
          # Real models: ~188 KB (singles), ~360 KB (doubles).
          # 160 000 bytes catches all known stubs with clear margin below real singles.
          MIN_PUBLISH_BYTES=160000
          SUSPECT_COUNT=0
          for z in release-models/*.zip; do
            ZSIZE=$(stat -c%s "$z" 2>/dev/null || stat -f%z "$z")
            if [ "${ZSIZE}" -lt "${MIN_PUBLISH_BYTES}" ]; then
              echo "::warning::Suspect model (${ZSIZE} bytes < ${MIN_PUBLISH_BYTES}) — likely untrained stub: $(basename "$z")"
              SUSPECT_COUNT=$(( SUSPECT_COUNT + 1 ))
            fi
          done
          if [ "${SUSPECT_COUNT}" -gt 0 ]; then
            echo "::warning::${SUSPECT_COUNT} suspect model(s) included in this release — review individual job logs for 'steps trained'."
          fi

          # Delete any pre-existing NON-immutable release at this exact tag (e.g. a
          # partial prior run at the same attempt number). Immutable releases will
          # reject the delete — the || true ensures we still attempt gh release create
          # and surface the real error if the tag is truly blocked.
          # Note: --cleanup-tag is intentionally omitted; the git tag of an immutable
          # release cannot be deleted, and we don't need to since the tag is already unique.
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists — deleting before recreate"
            gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag || \
              git push --delete origin "$TAG" 2>/dev/null || true
          fi
          gh release create "$TAG" --repo "$REPO" --title "$TITLE" --notes "$NOTES" release-models/*.zip
          echo "Release ready: $TAG"
