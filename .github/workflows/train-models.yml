name: Train ML Models

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 250
    strategy:
      fail-fast: false
      matrix:
        config:
          - { format: gen9randombattle,        team_format: "",                  timesteps: 500000, train_timeout: 160 }
          - { format: gen9ou,                  team_format: gen9ou,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9doublesou,           team_format: gen9doublesou,       timesteps: 300000, train_timeout: 230 }
          - { format: gen9nationaldex,         team_format: gen9nationaldex,     timesteps: 500000, train_timeout: 160 }
          - { format: gen9monotype,            team_format: gen9monotype,        timesteps: 500000, train_timeout: 160 }
          - { format: gen9anythinggoes,        team_format: gen9anythinggoes,    timesteps: 500000, train_timeout: 160 }
          - { format: gen9vgc2026regi,         team_format: gen9vgc2026regi,     timesteps: 300000, train_timeout: 230 }
          - { format: gen9vgc2026regf,         team_format: gen9vgc2026regf,     timesteps: 300000, train_timeout: 230 }
          - { format: gen9randomdoublesbattle, team_format: "",                  timesteps: 300000, train_timeout: 230 }
          - { format: gen9ubers,               team_format: gen9ubers,           timesteps: 500000, train_timeout: 160 }
          - { format: gen9uu,                  team_format: gen9uu,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9ru,                  team_format: gen9ru,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9nu,                  team_format: gen9nu,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9pu,                  team_format: gen9pu,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9zu,                  team_format: gen9zu,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9lc,                  team_format: gen9lc,              timesteps: 500000, train_timeout: 160 }
          - { format: gen9doublesubers,        team_format: gen9doublesubers,    timesteps: 300000, train_timeout: 230 }
          - { format: gen9doublesuu,           team_format: gen9doublesuu,       timesteps: 300000, train_timeout: 230 }
          - { format: gen9vgc2026regfbo3,      team_format: gen9vgc2026regfbo3,  timesteps: 300000, train_timeout: 230 }
          - { format: gen9vgc2026regibo3,      team_format: gen9vgc2026regibo3,  timesteps: 300000, train_timeout: 230 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        shell: bash
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Start Pokemon Showdown server
        shell: bash
        run: |
          git clone --depth 1 https://github.com/smogon/pokemon-showdown.git "$RUNNER_TEMP/showdown"
          cd "$RUNNER_TEMP/showdown"
          echo "--- Installing Showdown dependencies ---"
          npm install

          echo "--- Patching config/formats.ts ---"
          python3 "$GITHUB_WORKSPACE/scripts/patch_showdown_formats.py" config/formats.ts

          echo "--- Starting Showdown server ---"
          node pokemon-showdown start --no-security --max-old-space-size=3000 > "$RUNNER_TEMP/showdown.log" 2>&1 &
          SHOWDOWN_PID=$!

          echo "--- Waiting for Showdown HTTP endpoint (max 60s) ---"
          WAIT_SECS=0
          until curl --output /dev/null --silent --head --fail --max-time 5 http://localhost:8000; do
            if ! kill -0 $SHOWDOWN_PID 2>/dev/null; then
              echo "Showdown process died. Log:" && cat "$RUNNER_TEMP/showdown.log" && exit 1
            fi
            WAIT_SECS=$((WAIT_SECS + 1))
            if [ "$WAIT_SECS" -ge 60 ]; then
              echo "Showdown not ready after 60s. Log:" && cat "$RUNNER_TEMP/showdown.log" && exit 1
            fi
            sleep 1
          done

          echo "--- Verifying WebSocket connectivity ---"
          python3 "$GITHUB_WORKSPACE/scripts/check_showdown_ws.py" \
            || (echo "WS check failed. Log:" && cat "$RUNNER_TEMP/showdown.log" && exit 1)

          echo "--- Showdown server is ready ---"

      - name: Train ${{ matrix.config.format }}
        timeout-minutes: ${{ matrix.config.train_timeout }}
        shell: bash
        env:
          PYTHONUNBUFFERED: "1"
          TRAIN_FORMAT: ${{ matrix.config.format }}
          TRAIN_TIMESTEPS: ${{ matrix.config.timesteps }}
          TRAIN_TEAM_FORMAT: ${{ matrix.config.team_format }}
          TRAIN_TIMEOUT_MINUTES: ${{ matrix.config.train_timeout }}
        run: |
          ARGS="--format $TRAIN_FORMAT --timesteps $TRAIN_TIMESTEPS --save-dir data/ml/policy"
          if [ -n "$TRAIN_TEAM_FORMAT" ]; then
            ARGS="$ARGS --team-format $TRAIN_TEAM_FORMAT"
          fi
          # Send SIGINT (KeyboardInterrupt in Python) 3 min before the GitHub
          # step timeout fires SIGKILL. This lets train_policy.py save the model
          # before the process is force-killed.
          GRACE_SECS=$(( (TRAIN_TIMEOUT_MINUTES - 3) * 60 ))
          timeout --signal=INT ${GRACE_SECS}s python -m src.ml.train_policy $ARGS || {
            EXIT=$?
            if [ $EXIT -eq 124 ]; then
              echo "Training timed out after ${GRACE_SECS}s — final_model.zip should have been saved."
            else
              echo "Training exited with code $EXIT"
              exit $EXIT
            fi
          }

      - name: Verify model artifact exists
        shell: bash
        env:
          TRAIN_FORMAT: ${{ matrix.config.format }}
        run: |
          MODEL_PATH="data/ml/policy/${TRAIN_FORMAT}/final_model.zip"
          if [ -f "$MODEL_PATH" ]; then
            SIZE=$(stat -c%s "$MODEL_PATH" 2>/dev/null || stat -f%z "$MODEL_PATH")
            echo "✅ Model saved: $MODEL_PATH (${SIZE} bytes)"
          else
            echo "⚠️  final_model.zip not found at $MODEL_PATH — artifact will be empty"
            ls -la "data/ml/policy/${TRAIN_FORMAT}/" 2>/dev/null || echo "Directory does not exist"
          fi

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: model-${{ matrix.config.format }}
          path: data/ml/policy/${{ matrix.config.format }}/final_model.zip
          if-no-files-found: warn
          retention-days: 90

  package:
    needs: train
    runs-on: ubuntu-latest
    if: always()

    permissions:
      actions: write
      contents: write

    steps:
      - name: Download all models
        uses: actions/download-artifact@v8
        with:
          pattern: model-*
          path: all-models
          merge-multiple: true

      - name: List models
        shell: bash
        run: find all-models -name "*.zip" | sort

      - name: Rename models for release
        shell: bash
        run: |
          mkdir -p release-models
          find all-models -path "*/policy/*/final_model.zip" | while IFS= read -r f; do
            format=$(basename "$(dirname "$f")")
            cp "$f" "release-models/${format}_final_model.zip"
          done
          echo "Release assets:"
          ls release-models/

      - name: Publish models as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ml-models-r${{ github.run_number }}
          name: "ML Models — run #${{ github.run_number }}"
          body: |
            Trained models for all formats from workflow run #${{ github.run_number }}.
            Each zip contains the final PPO policy for one Showdown format.
            Download individual format models below and place them in `data/ml/policy/<format>/final_model.zip`.
          files: release-models/*.zip
          fail_on_unmatched_files: false
