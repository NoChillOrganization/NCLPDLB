name: Train ML Models

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      timesteps:
        description: "Training steps per format (manual production runs only — CI uses matrix.timesteps)"
        required: false
        default: "500000"

permissions:
  actions: write
  contents: write
  packages: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: gen9randombattle
            team_format: ""
            timesteps: 100000
          - format: gen9ou
            team_format: gen9ou
            timesteps: 100000
          - format: gen9doublesou
            team_format: gen9doublesou
            timesteps: 50000
          - format: gen9nationaldex
            team_format: gen9nationaldex
            timesteps: 100000
          - format: gen9monotype
            team_format: gen9monotype
            timesteps: 100000
          - format: gen9anythinggoes
            team_format: gen9anythinggoes
            timesteps: 100000
          - format: gen9vgc2026regi
            team_format: gen9vgc2026regi
            timesteps: 15000
          - format: gen9vgc2026regf
            team_format: gen9vgc2026regf
            timesteps: 15000
          - format: gen9randomdoublesbattle
            team_format: ""
            timesteps: 50000
          - format: gen9ubers
            team_format: gen9ubers
            timesteps: 100000
          - format: gen9uu
            team_format: gen9uu
            timesteps: 100000
          - format: gen9ru
            team_format: gen9ru
            timesteps: 100000
          - format: gen9nu
            team_format: gen9nu
            timesteps: 100000
          - format: gen9pu
            team_format: gen9pu
            timesteps: 100000
          - format: gen9zu
            team_format: gen9zu
            timesteps: 100000
          - format: gen9lc
            team_format: gen9lc
            timesteps: 100000
          - format: gen9doublesubers
            team_format: gen9doublesubers
            timesteps: 50000
          - format: gen9doublesuu
            team_format: gen9doublesuu
            timesteps: 50000
          - format: gen9vgc2026regfbo3
            team_format: gen9vgc2026regfbo3
            timesteps: 10000
          - format: gen9vgc2026regibo3
            team_format: gen9vgc2026regibo3
            timesteps: 10000

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Start Pokemon Showdown server
        run: |
          git clone --depth 1 https://github.com/smogon/pokemon-showdown.git /tmp/showdown
          cd /tmp/showdown
          echo "--- Installing Showdown dependencies ---"
          npm install

          echo "--- Patching config/formats.ts: emptying banlists for tier/doubles-tier formats ---"
          python3 "$GITHUB_WORKSPACE/scripts/patch_showdown_formats.py" config/formats.ts

          echo "--- Starting Showdown server (auto-builds patched TypeScript on start) ---"
          node pokemon-showdown start --no-security --max-old-space-size=3000 > /tmp/showdown.log 2>&1 &
          SHOWDOWN_PID=$!

          echo "--- Waiting for Showdown HTTP endpoint (max 60s) ---"
          WAIT_SECS=0
          until curl --output /dev/null --silent --head --fail --max-time 5 http://localhost:8000; do
            if ! kill -0 $SHOWDOWN_PID 2>/dev/null; then
              echo "Showdown process died. Log:" && cat /tmp/showdown.log && exit 1
            fi
            WAIT_SECS=$((WAIT_SECS + 1))
            if [ "$WAIT_SECS" -ge 60 ]; then
              echo "Showdown not ready after 60s. Log:" && cat /tmp/showdown.log && exit 1
            fi
            sleep 1
          done

          echo "--- Verifying WebSocket connectivity (poke-env requires WS, not just HTTP) ---"
          python3 "$GITHUB_WORKSPACE/scripts/check_showdown_ws.py" \
            || (echo "WS check failed. Showdown log:" && cat /tmp/showdown.log && exit 1)

          echo "--- Showdown server is ready ---"

      - name: Train ${{ matrix.format }}
        timeout-minutes: 80
        run: |
          ARGS="--format ${{ matrix.format }} --timesteps ${{ matrix.timesteps }} --save-dir data/ml/policy"
          if [ -n "${{ matrix.team_format }}" ]; then
            ARGS="$ARGS --team-format ${{ matrix.team_format }}"
          fi
          python -m src.ml.train_policy $ARGS
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload model artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: model-${{ matrix.format }}
          path: data/ml/policy/${{ matrix.format }}/final_model.zip
          if-no-files-found: warn
          retention-days: 90

  package:
    needs: train
    runs-on: ubuntu-latest
    if: always()

    permissions:
      actions: write
      contents: write

    steps:
      - name: Download all models
        uses: actions/download-artifact@v8
        with:
          pattern: model-*
          path: all-models
          merge-multiple: false

      - name: List models
        run: find all-models -name "*.zip" | sort

      - name: Upload combined artifact
        uses: actions/upload-artifact@v7
        with:
          name: all-models
          path: all-models/
          retention-days: 90
