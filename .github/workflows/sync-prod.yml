name: Production Sync

# Scheduled production data sync — runs on the self-hosted runner where
# prod Postgres is reachable at localhost:5432.
#
# Schedules:
#   Monthly (1st at 09:00 UTC): Smogon usage stats (new month's data is posted ~1st)
#   Daily   (06:00 UTC):        Limitless VGC tournaments + Showdown replays
#
# All syncs are idempotent: reruns / over-fires are safe (ON CONFLICT DO NOTHING).
# Failures write to dead_letter table and trigger the notification step.
on:
  schedule:
    - cron: '0 9 1 * *'   # monthly: Smogon usage stats
    - cron: '0 6 * * *'   # daily: tournaments + replays
  workflow_dispatch:
    inputs:
      source:
        description: 'Which sync to run: smogon | pikalytics | limitless | replays | all'
        default: 'all'
        required: false

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: Run production sync
    runs-on: [self-hosted]  # existing actions-runner; prod Postgres at localhost

    # Pin shell explicitly — self-hosted Windows runner defaults to pwsh, and a
    # prior bash-syntax step (backslash continuations, $VAR) parsed as pwsh and
    # crashed before Python ran. Git Bash is present on the runner.
    defaults:
      run:
        shell: bash

    env:
      PLATFORM_DATABASE_URL: ${{ secrets.PLATFORM_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          # No pip cache on self-hosted — cache dir permissions vary per runner config.

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- Daily syncs ---

      - name: Sync daily sources (limitless + replays)
        if: >-
          github.event.schedule == '0 6 * * *' ||
          github.event_name == 'workflow_dispatch' && (inputs.source == 'limitless' || inputs.source == 'replays' || inputs.source == 'all')
        run: >
          python -m src.platform.sync_all
          --sources limitless replays
          --game VGC
          --limit 50
          --replay-format gen9championsvgc2026regmb
          --pages 5
          --min-rating 1500

      # --- Monthly syncs (1st of each month) ---

      - name: Sync monthly sources (smogon + pikalytics)
        if: >-
          github.event.schedule == '0 9 1 * *' ||
          github.event_name == 'workflow_dispatch' && (inputs.source == 'smogon' || inputs.source == 'pikalytics' || inputs.source == 'all')
        run: >
          python -m src.platform.sync_all
          --sources smogon pikalytics
          --formats gen9championsvgc2026regmb gen9ou gen9championsvgc2026regmbbo3
          --cutoff 1500

      # --- Post-sync health check + alerting ---

      - name: Check pipeline health (monitoring alerts)
        # Runs regardless of earlier step outcomes so alerts are always emitted.
        # Exits 1 if alerts found — captured in the notification step below.
        if: always()
        id: monitoring
        run: python -m src.platform.monitoring
        continue-on-error: true  # don't block; the notification step handles failures

      - name: Notify on failure or stale sync
        if: failure() || steps.monitoring.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const isSync   = '${{ job.status }}' === 'failure';
            const isStale  = '${{ steps.monitoring.outcome }}' === 'failure';
            const titleTag = isSync ? 'Production sync failed' : 'Ingest health alert';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${titleTag}: ${context.workflow} (${new Date().toISOString().slice(0,10)})`,
              body: [
                `**Workflow:** ${context.workflow}`,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Trigger:** ${context.eventName}`,
                '',
                isSync  ? '❌ One or more sync steps failed. Check the run log above.' : '',
                isStale ? '⚠️  Monitoring check fired — stale sync, repeated failure, volume drop, or parse errors detected.' : '',
                '',
                'Diagnose:',
                '```sql',
                'SELECT * FROM source_health;',
                'SELECT * FROM recent_dead_letters;',
                '```',
              ].filter(l => l !== undefined).join('\n'),
              labels: ['sync-failure'],
            });
