services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pokemon_pipeline
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d pokemon_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10
    env_file: .env
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  classifier-node:
    build: ./node_services/classifier
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  fastapi:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      classifier-node:
        condition: service_started
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: .
      args:
        INSTALL_CHROMIUM: "true"
    command: celery -A celery_app worker --loglevel=info --concurrency=4 -Q limitless,labmaus,rk9,smogon,youtube,processing
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  celery-beat:
    build: .
    command: celery -A celery_app beat --loglevel=info
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  flower:
    build: .
    command: celery -A celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  discord-bot:
    build: .
    command: python -m bot.main
    env_file: .env
    restart: unless-stopped
    depends_on:
      fastapi:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pg_data:
